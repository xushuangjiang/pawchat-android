name: Build APK
triggering_events:
  - push
  - pull_request
branch_patterns:
  - pattern: 'main'
    include: true
    source: true

workflows:
  build-apk:
    name: Build APK for S24 Ultra
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      
      - name: Analyze code
        script: |
          flutter analyze
      
      - name: Build APK (ARM64 for S24 Ultra)
        script: |
          flutter build apk --release --split-per-abi
      
      - name: Build universal APK
        script: |
          flutter build apk --release
    
    artifacts:
      - build/**/outputs/**/*.apk
    
    publishing:
      email:
        recipients:
          - xsj@localhost
        notify:
          success: true
          failure: true
