name: pawchat_android
description: OpenClaw Gateway Android Client - PawChat
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # JSON
  json_annotation: ^4.8.1
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_markdown: ^0.6.18
  cached_network_image: ^3.3.1
  
  # Attachments
  image_picker: ^1.0.5
  file_picker: ^6.1.1
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # Utilities
  uuid: ^4.2.2
  intl: ^0.18.1
  url_launcher: ^6.2.4
  path_provider: ^2.1.2
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf
